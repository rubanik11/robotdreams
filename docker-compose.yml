# Compose-файл для course-app з redis

services:
  course-app:
    build:
      # код і requirements.txt лежать в apps/course-app
      context: ./apps/course-app
      # Dockerfile в корені репо
      dockerfile: ../../Dockerfile
    ports:
      - "8080:8080"
    environment:
      APP_STORE: redis
      APP_REDIS_URL: redis://redis:6379/0
    # чекаємо поки redis підніметься
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      # щоб дані не губились при рестарті
      - redis_data:/data
    # перевіряємо чи redis живий
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis_data:
